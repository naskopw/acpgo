version: "2"
run:
  timeout: 3m
  exclude-dirs:
    - .git
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - bodyclose
    - noctx
  settings:
    revive:
      rules:
        - name: exported
          severity: warning
